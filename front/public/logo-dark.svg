<svg xmlns="http://www.w3.org/2000/svg" width="240" height="64" viewBox="0 0 240 64">
  <defs>
    <linearGradient id="gradient-dark" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#06b6d4"/>
      <stop offset="1" stop-color="#7c3aed"/>
    </linearGradient>
    <filter id="shadow-dark" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.25" />
    </filter>
  </defs>

  <!-- Background container -->
  <rect width="240" height="64" rx="12" fill="black" opacity="0.05" />

  <!-- Logo icon container -->
  <g transform="translate(12,12)">
    <!-- Outer blue square with rounded corners -->
    <rect x="0" y="0" width="40" height="40" rx="8" fill="#2563EB" filter="url(#shadow-dark)" />
    <!-- Inner white square (hole) -->
    <rect x="10" y="10" width="20" height="20" rx="4" fill="white" />
  </g>

  <!-- TreinAI text -->
  <text x="68" y="34" font-family="Inter, Arial, Helvetica, sans-serif" font-weight="700" font-size="18" fill="#ffffff">TreinAI</text>
  
  <!-- Tagline -->
  <text x="68" y="50" font-family="Inter, Arial, Helvetica, sans-serif" font-weight="500" font-size="10" fill="#cbd5e1">Muito além do Personal Trainner IA.</text>
</svg>